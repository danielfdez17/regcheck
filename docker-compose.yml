services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    environment:
      # Runtime URL for the API (preferred in production; written to runtime-config.js on start)
      REGCHECK_API_BASE_URL: ${REGCHECK_API_BASE_URL:-${VITE_API_BASE_URL:-http://localhost:8000}}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - regcheck

networks:
  regcheck:
    driver: bridge
