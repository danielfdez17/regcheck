services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regcheck}
      POSTGRES_USER: ${POSTGRES_USER:-regcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - regcheck

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    environment:
      REGCHECK_DEBUG: ${REGCHECK_DEBUG:-false}
      REGCHECK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-regcheck}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-regcheck}
      REGCHECK_FRONTEND_ORIGIN: ${REGCHECK_FRONTEND_ORIGIN:-http://localhost:3001}
      REGCHECK_JWT_SECRET_KEY: ${REGCHECK_JWT_SECRET_KEY:-change-me-in-production}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - regcheck

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - regcheck

volumes:
  postgres-data:

networks:
  regcheck:
    driver: bridge
